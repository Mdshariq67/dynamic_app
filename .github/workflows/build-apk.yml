name: Build White-Label APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name e.g. "City Library"'
        required: true
        type: string
      app_slug:
        description: 'Release tag slug e.g. "city-library-v1"'
        required: true
        type: string
      description:
        description: 'Tagline shown on the home screen'
        required: true
        type: string
      primary_color:
        description: 'Primary hex without # e.g. "1A237E"'
        required: true
        type: string
      secondary_color:
        description: 'Secondary hex without # e.g. "E8EAF6"'
        required: true
        type: string
      accent_color:
        description: 'Accent hex without # e.g. "FF6F00"'
        required: true
        type: string
      font_family:
        description: 'Font family for all app text'
        required: true
        type: choice
        options:
          - Poppins
          - Roboto
          - Lato
          - Montserrat
          - Nunito
      logo_url:
        description: 'Public URL to a PNG logo image'
        required: true
        type: string
      version_name:
        description: 'Semantic version e.g. "1.0.0"'
        required: true
        type: string
        default: '1.0.0'
      version_code:
        description: 'Integer build number e.g. "1"'
        required: true
        type: string
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Download logo
        run: |
          curl -L --fail -o assets/logo.png "${{ inputs.logo_url }}"
          echo "Logo downloaded"
          ls -la assets/logo.png

      - name: Generate lib/config/app_config.dart
        env:
          APP_NAME: ${{ inputs.app_name }}
          APP_SLUG: ${{ inputs.app_slug }}
          DESCRIPTION: ${{ inputs.description }}
          PRIMARY_COLOR: ${{ inputs.primary_color }}
          SECONDARY_COLOR: ${{ inputs.secondary_color }}
          ACCENT_COLOR: ${{ inputs.accent_color }}
          FONT_FAMILY: ${{ inputs.font_family }}
        run: |
          PRIMARY_COLOR="${PRIMARY_COLOR//#/}"
          SECONDARY_COLOR="${SECONDARY_COLOR//#/}"
          ACCENT_COLOR="${ACCENT_COLOR//#/}"

          cat > lib/config/app_config.dart << 'EOF'
          // AUTO-GENERATED — do not edit manually
          import 'package:flutter/material.dart';

          class AppConfig {
            AppConfig._();
            static const String appName = "APP_NAME_PLACEHOLDER";
            static const String appSlug = "APP_SLUG_PLACEHOLDER";
            static const String description = "DESCRIPTION_PLACEHOLDER";
            static const Color primaryColor = Color(0xFFPRIMARY_PLACEHOLDER);
            static const Color secondaryColor = Color(0xFFSECONDARY_PLACEHOLDER);
            static const Color accentColor = Color(0xFFACCENT_PLACEHOLDER);
            static const String fontFamily = "FONT_PLACEHOLDER";
            static const String logoPath = "assets/logo.png";
          }
          EOF

          sed -i "s|APP_NAME_PLACEHOLDER|${APP_NAME}|g" lib/config/app_config.dart
          sed -i "s|APP_SLUG_PLACEHOLDER|${APP_SLUG}|g" lib/config/app_config.dart
          sed -i "s|DESCRIPTION_PLACEHOLDER|${DESCRIPTION}|g" lib/config/app_config.dart
          sed -i "s|PRIMARY_PLACEHOLDER|${PRIMARY_COLOR}|g" lib/config/app_config.dart
          sed -i "s|SECONDARY_PLACEHOLDER|${SECONDARY_COLOR}|g" lib/config/app_config.dart
          sed -i "s|ACCENT_PLACEHOLDER|${ACCENT_COLOR}|g" lib/config/app_config.dart
          sed -i "s|FONT_PLACEHOLDER|${FONT_FAMILY}|g" lib/config/app_config.dart

          echo "--- Generated app_config.dart ---"
          cat lib/config/app_config.dart

      - name: Update Android app_name string resource
        env:
          APP_NAME: ${{ inputs.app_name }}
        run: |
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${APP_NAME}</string>|" \
            android/app/src/main/res/values/styles.xml
          echo "--- Updated styles.xml ---"
          cat android/app/src/main/res/values/styles.xml

      - name: Update build.gradle.kts
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          APP_ID="com.whitelabel.$(echo "${APP_SLUG}" | tr '-' '_')"

          sed -i \
            "s|applicationId = \".*\"|applicationId = \"${APP_ID}\"|" \
            android/app/build.gradle.kts

          sed -i \
            "s|versionCode = .*|versionCode = ${VERSION_CODE}|" \
            android/app/build.gradle.kts

          sed -i \
            "s|versionName = \".*\"|versionName = \"${VERSION_NAME}\"|" \
            android/app/build.gradle.kts

          echo "--- Updated build.gradle.kts ---"
          cat android/app/build.gradle.kts

          sed -i "s|\"package_name\": \".*\"|\"package_name\": \"${APP_ID}\"|" \
            android/app/google-services.json

          echo "--- Updated google-services.json ---"
          cat android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK (Flutter debug signed)
        run: flutter build apk --release

      - name: Rename APK
        run: |
          ls -la build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/app-release.apk \
             "${{ inputs.app_slug }}.apk"
          echo "APK ready: ${{ inputs.app_slug }}.apk"
          ls -la "${{ inputs.app_slug }}.apk"

      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ inputs.app_slug }}" \
            --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.app_slug }}" \
            --title "${{ inputs.app_name }} v${{ inputs.version_name }}" \
            --notes "Built by white-label panel | Font: ${{ inputs.font_family }}" \
            "${{ inputs.app_slug }}.apk"