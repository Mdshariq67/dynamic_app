name: Build White-Label APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name e.g. "City Library"'
        required: true
        type: string
      app_slug:
        description: 'Release tag slug e.g. "city-library-v1"'
        required: true
        type: string
      description:
        description: 'Tagline shown on the home screen'
        required: true
        type: string
      primary_color:
        description: 'Primary hex without # e.g. "1A237E"'
        required: true
        type: string
      secondary_color:
        description: 'Secondary hex without # e.g. "E8EAF6"'
        required: true
        type: string
      accent_color:
        description: 'Accent hex without # e.g. "FF6F00"'
        required: true
        type: string
      font_family:
        description: 'Font family for all app text'
        required: true
        type: choice
        options:
          - Poppins
          - Roboto
          - Lato
          - Montserrat
          - Nunito
      logo_url:
        description: 'Public URL to a PNG logo image (follows redirects)'
        required: true
        type: string
      version_name:
        description: 'Semantic version e.g. "1.0.0"'
        required: true
        type: string
        default: '1.0.0'
      version_code:
        description: 'Integer build number e.g. "1"'
        required: true
        type: string
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub Releases

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ────────────────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── 4. Pub cache ──────────────────────────────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ── 5. Logo ───────────────────────────────────────────────────────────
      - name: Download logo
        run: |
          curl -L --fail -o assets/logo.png "${{ inputs.logo_url }}"

      # ── 6. Generate app_config.dart ───────────────────────────────────────
      # Values are passed via env vars so special characters in inputs
      # don't interfere with the heredoc or shell expansion.
      - name: Generate lib/config/app_config.dart
        env:
          APP_NAME: ${{ inputs.app_name }}
          DESCRIPTION: ${{ inputs.description }}
          PRIMARY_COLOR: ${{ inputs.primary_color }}
          SECONDARY_COLOR: ${{ inputs.secondary_color }}
          ACCENT_COLOR: ${{ inputs.accent_color }}
          FONT_FAMILY: ${{ inputs.font_family }}
        run: |
          cat > lib/config/app_config.dart << EOF
          // AUTO-GENERATED — do not edit manually
          import 'package:flutter/material.dart';

          class AppConfig {
            static const String appName = "${APP_NAME}";
            static const String description = "${DESCRIPTION}";
            static const Color primaryColor = Color(0xFF${PRIMARY_COLOR});
            static const Color secondaryColor = Color(0xFF${SECONDARY_COLOR});
            static const Color accentColor = Color(0xFF${ACCENT_COLOR});
            static const String fontFamily = "${FONT_FAMILY}";
            static const String logoPath = "assets/logo.png";
          }
          EOF

      # ── 7. Patch build.gradle ─────────────────────────────────────────────
      # Targets the property-assignment lines inside defaultConfig {}.
      # Patterns use [[:space:]] so they match the assignment line
      # (e.g. "    versionCode 1") but NOT definition lines
      # (e.g. "    def flutterVersionCode = ...").
      - name: Patch android/app/build.gradle
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          APP_ID="com.whitelabel.$(echo "${APP_SLUG}" | tr '-' '_')"

          sed -i \
            "s|^\(\s*\)applicationId[[:space:]].*|\1applicationId \"${APP_ID}\"|" \
            android/app/build.gradle

          sed -i \
            "s|^\(\s*\)versionCode[[:space:]].*|\1versionCode ${VERSION_CODE}|" \
            android/app/build.gradle

          sed -i \
            "s|^\(\s*\)versionName[[:space:]].*|\1versionName \"${VERSION_NAME}\"|" \
            android/app/build.gradle

      # ── 8. Dependencies ───────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 9. Build ──────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # ── 10. Sign ──────────────────────────────────────────────────────────
      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          set -e

          echo "${KEYSTORE_BASE64}" | base64 -d > upload-keystore.jks

          BUILD_TOOLS_DIR="${ANDROID_SDK_ROOT}/build-tools/$(ls "${ANDROID_SDK_ROOT}/build-tools" | sort -V | tail -1)"

          "${BUILD_TOOLS_DIR}/apksigner" sign \
            --ks upload-keystore.jks \
            --ks-key-alias "${KEY_ALIAS}" \
            --ks-pass "pass:${STORE_PASSWORD}" \
            --key-pass "pass:${KEY_PASSWORD}" \
            --out build/app/outputs/flutter-apk/app-release-signed.apk \
            build/app/outputs/flutter-apk/app-release.apk

          echo "── Verifying signature ──"
          "${BUILD_TOOLS_DIR}/apksigner" verify \
            --print-certs \
            build/app/outputs/flutter-apk/app-release-signed.apk

          rm -f upload-keystore.jks

      # ── 11. Rename ────────────────────────────────────────────────────────
      - name: Rename signed APK
        run: |
          mv build/app/outputs/flutter-apk/app-release-signed.apk \
             "${{ inputs.app_slug }}.apk"

      # ── 12. Verify signature ──────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner \
          verify --verbose ${{ inputs.app_slug }}.apk

      # ── 13. Release ───────────────────────────────────────────────────────
      # Delete the existing release first so rebuilds with the same slug
      # replace rather than fail. --cleanup-tag removes the git tag too,
      # allowing gh release create to recreate it cleanly.
      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ inputs.app_slug }}" \
            --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.app_slug }}" \
            --title "${{ inputs.app_name }} v${{ inputs.version_name }}" \
            --notes "Built by white-label panel | Font: ${{ inputs.font_family }}" \
            "${{ inputs.app_slug }}.apk"
