name: dynamic_app
description: "White-label Flutter app — brand injected via lib/config/app_config.dart at build time."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_app_check: ^0.3.0
  cached_network_image: ^3.3.0
  shared_preferences: ^2.3.0
  provider: ^6.1.2
  web: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
